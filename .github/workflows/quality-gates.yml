name: Quality Gates

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-and-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run check:security

      - name: Build and verify docs baseline
        run: npm run check:docs-baseline

      - name: Check content health
        run: npm run check:content-health
